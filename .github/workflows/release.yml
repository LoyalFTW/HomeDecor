name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Package and Upload
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28 # v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Announce on Discord
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          tag = os.environ["TAG"]
          repo = os.environ["REPO"]
          release_url = f'{os.environ["SERVER_URL"]}/{repo}/releases/tag/{tag}'
          changelog_url = f'{os.environ["SERVER_URL"]}/{repo}/blob/{tag}/CHANGELOG.md'
          curseforge_url = "https://www.curseforge.com/wow/addons/home-decor"

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## [^\r\n]*{re.escape(tag)}[^\r\n]*\r?\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, changelog, flags=re.MULTILINE | re.DOTALL)
          notes = match.group(1).strip() if match else "A new HomeDecor update is available."

          notes = re.sub(r"^\[Full Changelog\]\([^)]+\)\s*", "", notes, flags=re.MULTILINE).strip()
          notes = notes.replace("    * ", "  - ")
          if len(notes) > 3300:
              notes = notes[:3290].rstrip() + "\n\n...more details in the full changelog."

          description = f"{notes}\n\n[View full changelog]({changelog_url})"
          payload = {
              "username": "HomeDecor Changelog",
              "allowed_mentions": {"parse": []},
              "embeds": [{
                  "title": f"HomeDecor {tag} released",
                  "url": release_url,
                  "description": description,
                  "color": 15120430,
                  "fields": [
                      {
                          "name": "Download",
                          "value": f"[GitHub Release]({release_url}) | [CurseForge]({curseforge_url})",
                          "inline": False
                      }
                  ],
                  "footer": {
                      "text": "HomeDecor - Housing made easier"
                  }
              }]
          }

          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK"] + "?wait=true",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "HomeDecorReleaseBot (GitHub Actions)"
              },
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              if response.status not in (200, 204):
                  raise RuntimeError(f"Discord webhook failed: HTTP {response.status}")
          PY
